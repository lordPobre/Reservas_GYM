{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Editar Ficha: {{ alumno.nombre_completo }}</h2>
        <a href="{% url 'lista_alumnos' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Volver al Listado</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4 bg-light rounded">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3 form-edicion">
                    {{ form.as_p }}
                </div>
                <hr class="my-4">
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'lista_alumnos' %}" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4 fw-bold shadow-sm"><i class="bi bi-save me-2"></i>Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .form-edicion p { margin-bottom: 1rem; width: 100%; }
    .form-edicion label { font-weight: 600; color: #495057; display: block; margin-bottom: 0.3rem;}
    .form-edicion input, .form-edicion select, .form-edicion textarea {
        display: block; width: 100%; padding: 0.375rem 0.75rem; border: 1px solid #ced4da; border-radius: 0.375rem;
    }
</style>
{% endblock %}
