{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - KAMEHOUSE Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .login-header {
            background-color: #212529;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        .login-header img {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            border-radius: 50%; 
        }
    </style>
</head>
<body>

    <div class="card border-0 login-card">
        <div class="login-header">
            <img src="{% static 'img/logo_kamehouse.webp' %}" alt="Logo Kame House" class="mb-3" style="max-height: 120px; width: auto;">
            <h3 class="fw-bold m-0">KAMEHOUSE</h3>
            <p class="text-secondary m-0">Sistema de Gestión</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center rounded-3">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control form-control-lg bg-light" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                        <input type="password" name="password" class="form-control form-control-lg bg-light" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                    INICIAR SESIÓN <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
