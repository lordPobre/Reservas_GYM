{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - KAMEHOUSE Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --kh-orange: #ff512f;
            --kh-dark: #1a1a1d;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1); /* Efecto cristal */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container img {
            max-height: 100px;
            filter: drop-shadow(0 0 15px rgba(255, 81, 47, 0.5));
            transition: transform 0.5s ease;
        }

        .logo-container img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .brand-name {
            color: white;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 1rem;
            font-size: 1.8rem;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 5px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border-radius: 12px 0 0 12px !important;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border-radius: 0 12px 12px 0 !important;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: var(--kh-orange) !important;
            box-shadow: 0 0 15px rgba(255, 81, 47, 0.3) !important;
        }

        .btn-login {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            border: none;
            color: white;
            font-weight: 800;
            padding: 15px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(221, 36, 118, 0.4);
            color: white;
        }
        .perseus-footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }
        
        .perseus-footer strong { color: #00d2ff; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="{% static 'img/logo_kamehouse.webp' %}" alt="Logo Kame House">
            <h1 class="brand-name">KAMEHOUSE</h1>
            <div class="badge bg-dark text-uppercase" style="font-size: 0.6rem; letter-spacing: 2px;">Admin System</div>
        </div>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="alert alert-danger py-2 small text-center rounded-3 bg-danger text-white border-0 mb-4">
                <i class="bi bi-shield-lock-fill me-2"></i> Acceso denegado
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-bold">Usuario de Staff</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Ej: clopez" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">
                Entrar al Dojo <i class="bi bi-lightning-fill ms-2"></i>
            </button>
        </form>
    </div>

    <a href="https://www.perseustechnology.dev" target="_blank" class="perseus-footer">
        Powered by <strong>Perseus Technology</strong>
    </a>

</body>
</html>
