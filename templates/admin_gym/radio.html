<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radio Kame House</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; color: white; padding: 15px; }
    </style>
</head>
<body>
    <h5 class="fw-bold mb-3 text-center text-success">📻 KAME HOUSE RADIO</h5>
    
    <select id="selector-musica" class="form-select form-select-sm mb-3 bg-dark text-white" onchange="cambiarPlaylist()">
        <option value="https://open.spotify.com/embed/playlist/37i9dQZF1EIeO67YI2P8Qv">Hard Techno & Acid</option>
        <option value="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP">Beast Mode (Hip-Hop)</option>
        <option value="https://open.spotify.com/embed/playlist/37i9dQZF1DWZq91oLsHZvy">Rock Workout</option>
        <option value="https://open.spotify.com/embed/playlist/37i9dQZF1DX70RN3TfRZZG">Workout (Pop/Dance)</option>
    </select>

    <iframe id="spotify-iframe" 
            style="border-radius:12px" 
            src="https://open.spotify.com/embed/playlist/37i9dQZF1EIeO67YI2P8Qv" 
            width="100%" 
            height="352" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
    </iframe>

    <script>
        function cambiarPlaylist() {
            var nuevaUrl = document.getElementById("selector-musica").value;
            document.getElementById("spotify-iframe").src = nuevaUrl;
        }
    </script>
</body>
</html>
